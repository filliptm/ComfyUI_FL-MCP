name: CI

on:
  push:
    branches:
      - main
      - "stabilization/**"
  pull_request:

permissions:
  contents: read

jobs:
  python:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: ["3.11", "3.12", "3.13"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip
      - run: python -m pip install -r requirements.txt
      - run: python -m pytest
      - run: python -m compileall -q backend mcp_daemon.py __init__.py
      - name: Embedded-path import smoke test
        run: >-
          python -I -c
          "import runpy;
          runpy.run_path(r'backend/mcp_server.py', run_name='embedded_mcp');
          runpy.run_path(r'backend/server.py', run_name='embedded_server')"

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: node --experimental-default-type=module --test tests/js/*.test.mjs
